name: Post-analysis Docker Image CI

on:
  push:
    branches: [ "main" ]
    paths:
      - ".github/workflows/PostAnalysisImage.yml"
      - "containers/PostAnalysis/Dockerfile"
      - "R/scripts/AnnotateSusie.R"
      - "R/scripts/MergeSusie.R"
      - "R/scripts/ComputeAncestrySkew.R"
  pull_request:
    branches: [ "main" ]
    paths:
      - ".github/workflows/PostAnalysisImage.yml"
      - "containers/PostAnalysis/Dockerfile"
      - "R/scripts/AnnotateSusie.R"
      - "R/scripts/MergeSusie.R"
      - "R/scripts/ComputeAncestrySkew.R"

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Log in to ghcr.io with docker
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.repository_owner}}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/postanalysis

      - name: Build and push docker containers
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/PostAnalysis/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
